nameOverride: ""
fullnameOverride: ""

global:
  imageRegistry: ""
  imagePullSecrets: []

image:
  registry: ""
  repository: ghcr.io/agynio/llm
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

replicaCount: 2
revisionHistoryLimit: 10
updateStrategy: {}

deploymentAnnotations: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

automountServiceAccountToken: true

rbac:
  create: false
  clusterWide: false
  rules: []

podAnnotations: {}
podLabels: {}

podSecurityContext:
  enabled: false
  fsGroup: null

securityContext:
  enabled: true
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

priorityClassName: ""
terminationGracePeriodSeconds: null

service:
  enabled: true
  type: ClusterIP
  annotations: {}
  labels: {}
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP

containerPorts:
  - name: grpc
    containerPort: 50051
    protocol: TCP

command: []
args: []
env: []
envFrom: []
extraEnvVars: []
extraEnvVarsCM: ""
extraEnvVarsSecret: ""

configMounts: []
extraVolumeMounts: []
extraVolumes: []

initContainers: []
extraContainers: []

lifecycle: {}

livenessProbe:
  enabled: true
  grpc:
    port: 50051

readinessProbe:
  enabled: true
  grpc:
    port: 50051

startupProbe:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: ""
  metrics: []
  behavior: {}

pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: null

ingress:
  enabled: false
  ingressClassName: nginx
  annotations: {}
  hosts: []
  tls: []

metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: ""
    scrapeTimeout: ""
    honorLabels: false
    labels: {}
    annotations: {}
    relabelings: []
    metricRelabelings: []
    endpoints: []

llm:
  grpcAddress: ":50051"
  authorizationAddress: "authorization:50051"
  databaseUrl:
    value: ""
    existingSecret: ""
    existingSecretKey: database-url
