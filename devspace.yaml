version: v2beta1

vars:
  LLM_NAMESPACE: platform

functions:
  disable_argocd_sync: |-
    if kubectl get application llm -n argocd >/dev/null 2>&1; then
      echo "Disabling ArgoCD auto-sync for llm..."
      kubectl patch application llm -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":null}}}'
      echo "ArgoCD auto-sync disabled."
    else
      echo "WARNING: ArgoCD Application 'llm' not found in argocd namespace."
    fi
  restore_argocd_sync: &restore_argocd_sync |-
    if kubectl get application llm -n argocd >/dev/null 2>&1; then
      echo "Re-enabling ArgoCD auto-sync for llm..."
      kubectl patch application llm -n argocd \
        --type merge \
        -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
      echo "ArgoCD auto-sync restored."
    else
      echo "WARNING: ArgoCD Application 'llm' not found in argocd namespace."
    fi
  patch_deployment: |-
    deployment=$(kubectl get deployment -n ${LLM_NAMESPACE} \
      -l app.kubernetes.io/name=llm,app.kubernetes.io/instance=llm \
      -o jsonpath='{.items[0].metadata.name}')
    if [ -z "$deployment" ]; then
      echo "ERROR: LLM deployment not found in namespace ${LLM_NAMESPACE}" >&2
      exit 1
    fi
    echo "Patching ${deployment} deployment for DevSpace..."
    kubectl patch deployment "$deployment" -n ${LLM_NAMESPACE} --type strategic --patch "$(cat <<'EOF'
    spec:
      template:
        spec:
          securityContext:
            runAsUser: 1000
            fsGroup: 1000
          initContainers: []
          volumes:
            - name: data
              emptyDir: {}
          containers:
            - name: llm
              image: ghcr.io/agynio/devcontainer-go:1 # dev container for source deploy
              workingDir: /opt/app/data
              command:
                - sh
                - -c
                - |
                  set -eu
                  elapsed=0
                  while [ ! -f /opt/app/data/go.mod ]; do
                    sleep 1; elapsed=$((elapsed + 1))
                    [ "$elapsed" -ge 120 ] && { echo "ERROR: sync timeout" >&2; exit 1; }
                  done
                  buf generate buf.build/agynio/api --path agynio/api/llm/v1 --path agynio/api/authorization/v1
                  exec go run ./cmd/llm
              volumeMounts:
                - name: data
                  mountPath: /opt/app/data
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
              livenessProbe: null
              readinessProbe: null
              startupProbe: null
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                readOnlyRootFilesystem: false
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
    EOF
    )"

pipelines:
  dev:
    flags:
      - name: watch
        short: w
        description: "Keep DevSpace running and stream logs"
    run: |-
      disable_argocd_sync
      patch_deployment
      if [ "$(get_flag "watch")" == "true" ]; then
        start_dev --disable-pod-replace llm
      else
        start_dev --disable-pod-replace llm
        echo "Waiting for llm to be healthy on :50051..."
        healthy=false
        for i in $(seq 1 60); do
          if exec_container --label-selector=app.kubernetes.io/name=llm,app.kubernetes.io/instance=llm -n ${LLM_NAMESPACE} -- bash -c 'nc -z localhost 50051 >/dev/null 2>&1 || (echo > /dev/tcp/localhost/50051) >/dev/null 2>&1'; then
            healthy=true
            break
          fi
          sleep 2
        done
        if [ "$healthy" != "true" ]; then
          echo "ERROR: LLM did not become healthy within 120s" >&2
          exit 1
        fi
        echo "Dev environment ready. Stopping dev session."
        stop_dev llm
      fi

hooks:
  - name: restore-argocd-auto-sync
    events:
      - after:dev:llm
    command: bash
    args:
      - -c
      - *restore_argocd_sync

dev:
  llm:
    namespace: ${LLM_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: llm
      app.kubernetes.io/instance: llm
    containers:
      llm:
        container: llm
        sync:
          - path: ./:/opt/app/data
            excludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            uploadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
            downloadExcludePaths:
              - .git/
              - .devspace/
              - /.gen/
              - /tmp/
        logs:
          enabled: true
          lastLines: 200
    ports:
      - port: "50051"
