name: Release Helm chart

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  CHART_DIR: charts/llm
  CHART_REGISTRY: oci://ghcr.io/agynio/charts

jobs:
  helm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine release version
        id: version
        run: |
          if [[ "${GITHUB_REF_NAME}" != v*.*.* ]]; then
            echo "Release tags must follow v*.*.*" >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Build chart dependencies
        run: helm dependency build "$CHART_DIR"

      - name: Lint chart
        run: helm lint "$CHART_DIR" --set database.url=dummy

      - name: Package chart
        run: |
          mkdir -p dist
          helm package "$CHART_DIR" \
            --destination dist \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}"

      - name: Push chart
        run: |
          CHART_NAME="$(basename "$CHART_DIR")"
          helm push "dist/${CHART_NAME}-${{ steps.version.outputs.version }}.tgz" "$CHART_REGISTRY"
